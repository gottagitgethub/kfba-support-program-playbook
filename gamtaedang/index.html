<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#123a2d" />
  <title>감태당 온라인 마케팅 성장보드 | 유정재 컨설팅</title>
  <meta name="description" content="감태당 감태 오란다의 빠른배송·채널·콘텐츠·크리에이터·90일 실행 전략을 한 화면에서 확인하고 함께 합의하는 전용 페이지" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ko_KR" />
  <meta property="og:title" content="감태당 온라인 마케팅 성장보드" />
  <meta property="og:description" content="서산 감태가 온라인에서 발견되고, 오늘 출발하게 만드는 90일 실행안" />
  <meta property="og:image" content="https://gottagitgethub.github.io/kfba-support-program-playbook/gamtaedang/og-gamtaedang.svg" />
  <link rel="stylesheet" href="style-a.css" />
  <link rel="stylesheet" href="style-b.css" />
  <style>.site-loading{min-height:100vh;display:grid;place-items:center;text-align:center;padding:30px;background:#fbf8ef;color:#173029}.site-loading i{display:block;width:44px;height:44px;margin:0 auto 14px;border:4px solid #d9ede3;border-top-color:#2f7a58;border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.site-loading h1{font-size:28px;line-height:1.25;margin:0 0 8px;letter-spacing:-.04em}.site-loading p{margin:0;color:#65736d}</style>
</head>
<body>
  <div class="site-loading" id="siteLoading"><div><i></i><h1>감태당 성장보드를 여는 중입니다</h1><p>마케팅 실행안과 활동지를 불러오고 있습니다.</p></div></div>
  <script>
    (async function () {
      try {
        const files = ['body-1.html', 'body-2.html', 'body-3.html'];
        const responses = await Promise.all(files.map(file => fetch(file, {cache: 'no-cache'})));
        if (responses.some(response => !response.ok)) throw new Error('페이지 구성 파일을 불러오지 못했습니다.');
        const sections = await Promise.all(responses.map(response => response.text()));
        document.body.innerHTML = sections.join('');
        const script = document.createElement('script');
        script.src = 'app.js';
        script.onload = function () {
          loadAll();
          calc();
          updateDone();
          if (!$('launchDate').value) {
            const d = new Date();
            d.setDate(d.getDate() + 1);
            $('launchDate').value = d.toISOString().slice(0, 10);
          }
          saveAll(true);
        };
        script.onerror = function () { throw new Error('실행 도구를 불러오지 못했습니다.'); };
        document.body.appendChild(script);
      } catch (error) {
        console.error(error);
        document.body.innerHTML = '<div class="site-loading"><div><h1>페이지를 열지 못했습니다</h1><p>잠시 후 새로고침해 주세요.</p></div></div>';
      }
    })();
  </script>
</body>
</html>
